<!DOCTYPE html>
<html ng-app="kavachApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Narasimha Kavach Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen text-base">

  <nav class="bg-white border-b border-gray-200" ng-if="auth.user">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-orange-600 text-lg mr-2">&#x1F64F;</span>
        <a href="#/dashboard" class="px-4 py-2 rounded-lg text-base font-medium"
           ng-class="{'bg-orange-50 text-orange-700': path==='/dashboard', 'text-gray-600 hover:text-gray-900 hover:bg-gray-100': path!=='/dashboard'}">Dashboard</a>
        <a href="#/admin" class="px-4 py-2 rounded-lg text-base font-medium"
           ng-if="auth.user.role==='admin'"
           ng-class="{'bg-orange-50 text-orange-700': path==='/admin', 'text-gray-600 hover:text-gray-900 hover:bg-gray-100': path!=='/admin'}">Admin</a>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-base text-gray-500">{{auth.user.name || auth.user.email}}</span>
        <button class="text-base text-gray-400 hover:text-gray-700" ng-click="logout()">Sign out</button>
      </div>
    </div>
  </nav>

  <div ng-view></div>

  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/services.js"></script>
  <script src="/js/controllers.js"></script>
</body>
</html>
